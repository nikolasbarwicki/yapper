name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: Yapper is maintained on a best-effort basis. Small, focused proposals with clear user value are easiest to review.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is hard, missing, or confusing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note any workarounds or other designs you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, links, or implementation notes if useful.
