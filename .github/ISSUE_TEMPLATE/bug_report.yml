name: Bug report
description: Report something that is broken or unreliable.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Yapper. This project is maintained on a best-effort basis, so clear reproduction steps help a lot.
  - type: input
    id: version
    attributes:
      label: Yapper version or commit
      description: Include the release version or commit SHA you built from.
      placeholder: "2.0.0 or abc1234"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "macOS 15.2"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Yapper
        2. Press Option+Space
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Attach relevant console output, screenshots, or screen recordings. Remove API keys and personal data first.
      render: text
